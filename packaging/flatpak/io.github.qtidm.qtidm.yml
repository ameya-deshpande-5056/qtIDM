app-id: io.github.qtidm.qtidm
runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk
command: qtIDM
finish-args:
  - --share=network
  - --socket=session-bus
  - --socket=wayland
  - --socket=x11
modules:
  - name: qtIDM
    buildsystem: cmake-ninja
    sources:
      - type: dir
        path: ../..
