<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="hero">
    <div class="mark">q</div>
    <div><strong>qtIDM Capture</strong><span id="pageTitle">Current tab</span></div>
    <span id="count" class="count">0</span>
  </header>
  <nav>
    <button class="tab active" data-panel="captures">CAPTURES</button>
    <button class="tab" data-panel="add">ADD URL</button>
    <button class="tab" data-panel="settings">SETTINGS</button>
  </nav>
  <section id="captures" class="panel active">
    <div class="section-head"><span id="status">Scanning this tab...</span><button id="clear" class="text-button">Clear</button></div>
    <main id="items"></main>
    <div id="empty" class="empty" hidden><b>No downloadable media yet</b><span>Start playback on the page, then reopen this panel.</span></div>
  </section>
  <section id="add" class="panel">
    <label for="manualUrl">Download addresses, one per line</label>
    <textarea id="manualUrl" rows="6" placeholder="https://example.com/file-1.zip&#10;https://example.com/file-2.zip"></textarea>
    <button id="sendManual" class="primary">SEND TO qtIDM</button>
    <p class="hint">Cookies, referrer, and your browser user agent are attached automatically.</p>
  </section>
  <section id="settings" class="panel">
    <label class="switch-row"><span><b>Intercept browser downloads</b><small>Cancel new browser downloads and send them to qtIDM.</small></span><input id="interceptDownloads" type="checkbox"><i></i></label>
    <label class="switch-row"><span><b>Capture page media</b><small>Detect HLS, DASH, direct video, and direct audio.</small></span><input id="captureMedia" type="checkbox"><i></i></label>
    <label for="excludedHosts">Excluded hosts</label>
    <textarea id="excludedHosts" rows="3" placeholder="example.com&#10;*.internal.example"></textarea>
    <label for="excludedExtensions">Excluded file extensions</label>
    <textarea id="excludedExtensions" rows="2" placeholder="pdf, jpg, png"></textarea>
    <label for="includedExtensions">Only intercept extensions</label>
    <textarea id="includedExtensions" rows="2" placeholder="zip, iso, mp4"></textarea>
    <label for="minDownloadBytes">Minimum intercepted size (bytes)</label>
    <input id="minDownloadBytes" type="number" min="0" step="1024" placeholder="0">
    <label class="switch-row"><span><b>Pause interception</b><small>Leave browser downloads alone until resumed.</small></span><input id="pauseInterception" type="checkbox"><i></i></label>
    <label class="switch-row"><span><b>Alt bypass</b><small>Hold Alt while starting a download to leave it in the browser.</small></span><input id="bypassWhenModifier" type="checkbox"><i></i></label>
    <button id="excludeCurrentSite" class="text-button">EXCLUDE CURRENT SITE</button>
    <button id="saveSettings" class="primary">SAVE SETTINGS</button>
    <p class="hint">DRM-protected streams cannot be downloaded.</p>
  </section>
  <footer id="notice">Ready</footer>
  <script src="popup.js"></script>
</body>
</html>
